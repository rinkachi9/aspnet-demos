services:
  zookeeper:
    image: docker.io/bitnamilegacy/zookeeper:3.9
    restart: always
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: docker.io/bitnamilegacy/kafka:2
    ports:
      - ${KAFKA_PORT:-9092}:9093
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,LOCALHOST://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=LOCALHOST:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,LOCALHOST://:9093
    healthcheck:
      test: 'bash -c "printf \"\" > /dev/tcp/localhost/9092"'
      interval: 5s
      timeout: 10s
      retries: 10
    restart: always
    depends_on:
      - zookeeper
    expose:
      - 9092

  kafka-init:
    image: docker.io/bitnamilegacy/kafka:2
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
    volumes:
      - ./docker/utils/kafka:/kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: [ "/bin/bash", "/kafka-init/kafka-create-topics.sh" ]

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - "9001:8080"
    environment:
      - KAFKA_BROKERS=kafka:9092
    restart: always
    expose:
      - 9001
    depends_on:
      - kafka

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"

  otel-collector:
    image: otel/opentelemetry-collector:0.103.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./utils/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - loki
      - jaeger

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./utils/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./utils/grafana/provisioning:/etc/grafana/provisioning
